name: Autonomous Job Scout

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC every day (twice a day)
    - cron: '0 0,12 * * *'
  # Allow manual trigger from the GitHub UI Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scout-jobs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright anthropic certifi

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run Background Scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFESSIONAL_CONTEXT: ${{ secrets.PROFESSIONAL_CONTEXT }}
        run: python scout.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f "data/scouted_roles.json" ]; then
            git add data/scouted_roles.json
            # Only commit if there are changes
            git diff --quiet && git diff --staged --quiet || (git commit -m "Automated job scout update" && git push)
          else
            echo "No data/scouted_roles.json file was generated during this run."
          fi
