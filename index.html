<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role Scout Agent - Jay's Job Dashboard</title>
    <meta name="description" content="AI-powered job scouting agent finding the most relevant roles for Jay.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🎯</text></svg>">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #020617 0%, #172554 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --gold: #f59e0b;
            --card-hover-border: rgba(59, 130, 246, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.6;
            background-attachment: fixed;
        }

        header {
            max-width: 860px;
            margin: 0 auto 1.5rem auto;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #93c5fd, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }

        .subtitle { color: var(--text-muted); font-size: 0.95rem; }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 860px;
            margin: 0 auto 1.5rem auto;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        .pulse {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-anim 2s infinite;
        }

        select {
            padding: 0.45rem 0.8rem;
            border-radius: 7px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }

        .container { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }

        /* ─── CARD ─── */
        .job-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            box-shadow: var(--glass-shadow);
            transition: border-color 0.2s ease;
            animation: slideUp 0.4s ease-out forwards;
            opacity: 0;
        }

        .job-card:hover { border-color: var(--card-hover-border); }

        /* ─── CARD HEADER ─── */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .card-number {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 0.2rem 0.5rem;
            flex-shrink: 0;
            align-self: flex-start;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        .card-header-left { flex: 1; min-width: 0; }

        .job-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.35;
            margin-bottom: 0.4rem;
        }

        .meta-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }

        .tag {
            background: rgba(255,255,255,0.08);
            padding: 0.15rem 0.65rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #cbd5e1;
        }

        .tag.priority-p0 {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            font-weight: 600;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .tag.priority-p1 {
            background: rgba(251, 146, 60, 0.2);
            color: #fed7aa;
            font-weight: 600;
            border: 1px solid rgba(251, 146, 60, 0.4);
        }

        .tag.priority-p2 {
            background: rgba(107, 114, 128, 0.2);
            color: #d1d5db;
            border: 1px solid rgba(107, 114, 128, 0.4);
        }

        .score-circle {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.4);
            border: 2.5px solid;
            flex-shrink: 0;
        }

        .score-low  { border-color: #ef4444;        color: #ef4444;       }

        .priority-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #000;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 1px 6px;
            border-radius: 4px;
            vertical-align: middle;
            margin-right: 4px;
            margin-top: -3px;
        }

        /* ─── ROLE SUMMARY (always visible) ─── */
        .role-summary {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-top: 0.75rem;
            line-height: 1.6;
        }

        /* ─── COLLAPSIBLE ROWS ─── */
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
            cursor: pointer;
            user-select: none;
            width: fit-content;
        }

        .toggle-row:hover .toggle-label { color: #e2e8f0; }

        .toggle-icon {
            font-size: 0.9rem;
            width: 22px; height: 22px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            flex-shrink: 0;
        }

        .toggle-label {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .toggle-chevron {
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: transform 0.2s;
            margin-left: 2px;
        }

        .toggle-chevron.open { transform: rotate(180deg); }

        /* ─── COLLAPSIBLE BODY ─── */
        .collapsible {
            display: none;
            margin-top: 0.6rem;
            padding: 0.9rem 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.2s ease-out;
        }

        .collapsible.open { display: block; }

        /* Agent Intelligence sub-sections */
        .intel-block { margin-bottom: 0.8rem; }
        .intel-block:last-child { margin-bottom: 0; }

        .intel-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--accent);
            margin-bottom: 0.3rem;
        }

        .intel-text {
            font-size: 0.88rem;
            color: #e2e8f0;
            line-height: 1.65;
        }

        /* Requirements */
        .req-text {
            font-size: 0.88rem;
            color: #e2e8f0;
            line-height: 1.65;
        }

        /* ─── CARD FOOTER ─── */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: 0.9rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .btn {
            display: inline-block;
            padding: 0.5rem 1.1rem;
            border-radius: 7px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
        }

        /* ─── PAGINATION ─── */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .page-btn {
            padding: 0.4rem 0.9rem;
            border-radius: 7px;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:hover:not(:disabled) { background: rgba(59,130,246,0.15); color: var(--primary); border-color: rgba(59,130,246,0.3); }
        .page-btn:disabled { opacity: 0.35; cursor: default; }
        .page-info { font-size: 0.85rem; color: var(--text-muted); }

        /* ─── MISC ─── */
        .loader { text-align: center; padding: 3rem; color: var(--text-muted); }

        .empty-state {
            text-align: center;
            padding: 4rem;
            background: var(--glass-bg);
            border-radius: 16px;
            border: 1px dashed rgba(255,255,255,0.2);
        }

        @keyframes pulse-anim {
            0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.7); }
            70%  { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
            100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }
        @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { to   { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        @media (max-width: 600px) {
            body { padding: 1rem; }
            h1 { font-size: 1.5rem; }
            .controls { flex-direction: column; gap: 0.75rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Role Scout Agent</h1>
        <p class="subtitle">AI powered personalized role scouting agent for Jay</p>
    </header>

    <div class="controls">
        <div class="status-badge">
            <span class="pulse"></span> 
            <span id="syncTime">Syncing...</span>
        </div>
        <div style="display: flex; gap: 1rem;">
            <select id="companyFilter" onchange="currentPage=1; renderJobs()">
                <option value="">All Companies</option>
            </select>
            <select id="priorityFilter" onchange="currentPage=1; renderJobs()">
                <option value="">All Priorities</option>
                <option value="P0">P0 Only</option>
                <option value="P0-P1">P0+P1</option>
            </select>
            <select id="sortSelect" onchange="currentPage=1; renderJobs()" style="display:none">
                <option value="score">Sort: Highest Score</option>
            </select>
        </div>
    </div>

    <div class="container" id="jobsContainer">
        <div class="loader">Loading roles…</div>
    </div>

    <script>
        let allJobs = [];
        let currentPage = 1;
        const ROLES_PER_PAGE = 5;
        const DATA_URL = "data/scouted_roles.json";

        async function fetchJobs() {
            try {
                const res = await fetch(`${DATA_URL}?t=${Date.now()}`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                allJobs = data.roles || [];
                const syncTime = data.last_synced ? new Date(data.last_synced).toLocaleString() : 'Recent';
                document.getElementById('syncTime').textContent = `Last Synced: ${syncTime}`;
                populateCompanyFilter();
                renderJobs();
            } catch {
                document.getElementById('jobsContainer').innerHTML = `
                    <div class="empty-state">
                        <h2 style="color:var(--text-muted)">No roles loaded</h2>
                        <p style="margin-top:.75rem;color:#64748b">Run the scout agent to populate results.</p>
                    </div>`;
            }
        }

        function populateCompanyFilter() {
            const companies = [...new Set(allJobs.map(j => j.company || 'Google'))].sort();
            const select = document.getElementById('companyFilter');
            companies.forEach(company => {
                const opt = document.createElement('option');
                opt.value = company;
                opt.textContent = company;
                select.appendChild(opt);
            });
        }

        function daysAgo(str) {
            if (!str) return 999;
            const t = str.toLowerCase();
            if (t.includes('today') || t.includes('hour')) return 0;
            const d = t.match(/(\d+)\s+day/);    if (d) return +d[1];
            const w = t.match(/(\d+)\s+week/);   if (w) return +w[1] * 7;
            const m = t.match(/(\d+)\s+month/);  if (m) return +m[1] * 30;
            return 999;
        }

        function toggle(colId, chevId) {
            const col = document.getElementById(colId);
            const chev = document.getElementById(chevId);
            col.classList.toggle('open');
            chev.classList.toggle('open');
        }

        function renderJobs() {
            const container = document.getElementById('jobsContainer');
            container.innerHTML = '';

            if (!allJobs.length) {
                container.innerHTML = `<div class="empty-state"><h2 style="color:var(--text-muted)">No matches yet</h2></div>`;
                return;
            }

            // Apply filters
            const companyFilter = document.getElementById('companyFilter').value;
            const priorityFilter = document.getElementById('priorityFilter').value;

            let filtered = allJobs.filter(job => {
                if (companyFilter && (job.company || 'Google') !== companyFilter) return false;
                if (priorityFilter === 'P0' && job.priority !== 'P0') return false;
                if (priorityFilter === 'P0-P1' && !['P0', 'P1'].includes(job.priority)) return false;
                return true;
            // Sort strictly by relevance_score
            filtered.sort((a,b) => (b.relevance_score || 0) - (a.relevance_score || 0));
            const sorted = filtered;


            const totalPages = Math.ceil(sorted.length / ROLES_PER_PAGE);
            if (currentPage > totalPages) currentPage = totalPages;
            const startIndex = (currentPage - 1) * ROLES_PER_PAGE;
            const page = sorted.slice(startIndex, startIndex + ROLES_PER_PAGE);

            page.forEach((job, i) => {
                const globalRank = startIndex + i + 1;
                const score = job.relevance_score || 0;
                const scoreClass = score >= 80 ? 'score-high' : score >= 60 ? 'score-med' : 'score-low';
                const id = (job.id || `job-${i}`).replace(/[^a-z0-9]/gi, '-');
                const whyFit = job.why_good_fit || job.tip_to_score || '';
                const howWin = job.how_to_win || '';
                const keyReqs = job.job_description || job.key_requirements || '';
                const summary = job.role_summary || '';
                const hasIntel = whyFit || howWin;
                const hasReqs  = !!keyReqs;

                const card = document.createElement('div');
                card.className = 'job-card';
                card.style.animationDelay = `${i * 0.07}s`;

                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-number">#${globalRank}</span>
                        <div class="card-header-left">
                            <div class="job-title">
                                ${job.priority === 'P0' ? '<span class="priority-badge">P0</span> ' : ''}
                                ${job.title || 'Unknown Role'}
                            </div>
                            <div class="meta-tags">
                                <span class="tag">🏢 ${job.company || 'Google'}</span>
                                <span class="tag">📍 ${job.location || 'India'}</span>
                                ${job.priority ? `<span class="tag priority-${job.priority.toLowerCase()}">${job.priority}</span>` : ''}
                            </div>
                        </div>
                        <div class="score-circle ${scoreClass}">${score}</div>
                    </div>

                    ${summary ? `<div class="role-summary">${summary}</div>` : ''}

                    ${hasIntel ? `
                    <div class="toggle-row" onclick="toggle('intel-${id}','chev-intel-${id}')">
                        <span class="toggle-icon">🤖</span>
                        <span class="toggle-label">Agent Intelligence</span>
                        <span class="toggle-chevron" id="chev-intel-${id}">▼</span>
                    </div>
                    <div class="collapsible" id="intel-${id}">
                        ${whyFit ? `<div class="intel-block"><div class="intel-label">Why you're a fit</div><div class="intel-text">${whyFit}</div></div>` : ''}
                        ${howWin ? `<div class="intel-block"><div class="intel-label">How to win this role</div><div class="intel-text">${howWin}</div></div>` : ''}
                    </div>` : ''}

                    ${hasReqs ? `
                    <div class="toggle-row" onclick="toggle('reqs-${id}','chev-reqs-${id}')">
                        <span class="toggle-icon">📄</span>
                        <span class="toggle-label">Job Description</span>
                        <span class="toggle-chevron" id="chev-reqs-${id}">▼</span>
                    </div>
                    <div class="collapsible" id="reqs-${id}">
                        <div class="req-text">${Array.isArray(keyReqs) ? keyReqs.map(r => `• ${r}`).join('<br>') : keyReqs}</div>
                    </div>` : ''}

                    <div class="card-footer">
                        <a href="${job.url}" target="_blank" class="btn">View & Apply →</a>
                    </div>
                `;
                container.appendChild(card);
            });

            if (totalPages > 1) {
                const pag = document.createElement('div');
                pag.className = 'pagination';
                pag.innerHTML = `
                    <button class="page-btn" id="prevBtn" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>
                    <span class="page-info">Page ${currentPage} of ${totalPages} &nbsp;·&nbsp; ${sorted.length} roles</span>
                    <button class="page-btn" id="nextBtn" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>
                `;
                container.appendChild(pag);
                document.getElementById('prevBtn')?.addEventListener('click', () => { currentPage--; renderJobs(); scrollTo({top:0,behavior:'smooth'}); });
                document.getElementById('nextBtn')?.addEventListener('click', () => { currentPage++; renderJobs(); scrollTo({top:0,behavior:'smooth'}); });
            }
        }

        window.onload = fetchJobs;
    </script>
</body>
</html>
